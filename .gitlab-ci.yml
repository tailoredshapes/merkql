stages:
  - test
  - publish

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  # Use tmpfs for test temp dirs — overlay fs kills fsync-heavy workloads (630x slowdown)
  TMPDIR: /dev/shm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry/
    - .cargo/git/
    - target/

test:
  stage: test
  tags:
    - shell
  timeout: 10m
  script:
    - cargo test --release -- --skip generate_jepsen_report
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

publish:
  stage: publish
  tags:
    - shell
  script:
    - echo "Publishing ${CI_COMMIT_TAG} to crates.io..."
    - cargo publish --token "$CARGO_REGISTRY_TOKEN"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  needs:
    - test
